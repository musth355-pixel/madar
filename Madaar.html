<style>
:root {
  --primary: #FF8A3D;
  --primary-dk: #C04010;
  --cream: #FFF6E9;
  --cream-md: #FFE8CC;
  --cream-dk: #FFD89E;
  --text-main: #3A2210;
  --text-muted: #7A5A38;
  --track: #FFE3D6;
  --font-display: 'Baloo 2', 'Tajawal', system-ui, sans-serif;
  --font-body: 'Tajawal', 'Nunito', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; }
body {
  font-family: var(--font-body);
  color: var(--text-main);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; }

/* ─── iPad device frame + scale-to-fit stage ─── */
.stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #0E0A07;
}
.ipad {
  position: relative;
  width: 1366px; height: 1024px;
  flex-shrink: 0;
  border-radius: 44px;
  background: #2A2118;
  padding: 18px;
  box-shadow: 0 30px 100px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05);
  transform-origin: center;
}
.ipad::before {
  content: '';
  position: absolute; top: 50%; right: -3px;
  width: 4px; height: 60px; border-radius: 2px;
  background: #1a1410; transform: translateY(-180%);
}
.ipad::after {
  content: '';
  position: absolute; top: 50%; right: -3px;
  width: 4px; height: 90px; border-radius: 2px;
  background: #1a1410; transform: translateY(-20%);
}
.ipad-screen {
  width: 100%; height: 100%;
  border-radius: 28px;
  background: var(--cream);
  overflow: hidden;
  position: relative;
}

/* iPad camera notch */
.ipad-cam {
  position: absolute; top: 28px; right: 22px;
  width: 8px; height: 8px; border-radius: 50%;
  background: #4A3A2A;
  z-index: 100;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.1);
}

#app { width: 100%; height: 100%; position: relative; }

/* Decorative blob (positioned per-screen) */
.blob {
  position: absolute; border-radius: 50%;
  pointer-events: none; filter: blur(.5px);
  z-index: 0;
}

/* ─── Animations ─── */
@keyframes pop {
  0%   { transform: scale(.6); opacity: 0; }
  60%  { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes pulse {
  0%   { transform: translateX(-50%) scale(.95); opacity: .6; }
  100% { transform: translateX(-50%) scale(1.25); opacity: 0; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%      { transform: translateX(-10px); }
  40%      { transform: translateX(10px); }
  60%      { transform: translateX(-7px); }
  80%      { transform: translateX(7px); }
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
@keyframes tileIn {
  from { transform: translateY(20px) scale(.92); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes confettiFly {
  0%   { transform: translate(-50%, -50%) rotate(0); opacity: 1; }
  100% { transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px))) rotate(var(--rot, 0)); opacity: 0; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

/* Tappable base */
.tappable {
  font-family: inherit; cursor: pointer; user-select: none;
  background: none; outline: none; border: none;
  -webkit-tap-highlight-color: transparent;
}
.tappable:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }

/* Scrollbars (subtle) */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(168,137,95,.3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(168,137,95,.5); }
</style>

<!-- Scale-to-fit script (iPad scales to viewport) -->
<script>
(function scaleStage(){
  const W = 1366, H = 1024;
  const ipad = document.getElementById('ipad');
  function fit() {
    const pad = 40;
    const sx = (window.innerWidth  - pad) / (W + 36);
    const sy = (window.innerHeight - pad) / (H + 36);
    const s = Math.min(sx, sy, 1);
    ipad.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
})();
</script>
